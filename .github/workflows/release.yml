name: Release

# 推送版本号 tag 时触发（带不带 v 都可：0.2.0 或 v0.2.0）：跑测试，把整个仓库
# 打成源码包（tar.gz + zip），然后在 Releases 创建一个以该 tag 命名的「草稿」
# release，自动生成 release notes，并把源码包作为附件上传。
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"    # 0.2.0
      - "v[0-9]+.[0-9]+.[0-9]+"   # v0.2.0（兼容旧格式）

# 允许内置的 GITHUB_TOKEN 创建 release。
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --extra dev pytest

      - name: Package repository archives
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="image-studio-${version}"
          # 从当前检出的 tag 提交树打包，自动排除 .git 与未跟踪文件（.venv/data 等）。
          git archive --format=tar.gz --prefix="${name}/" -o "${name}.tar.gz" HEAD
          git archive --format=zip    --prefix="${name}/" -o "${name}.zip"    HEAD
          ls -lh "${name}".tar.gz "${name}".zip

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="image-studio-${version}"
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "${name}.tar.gz" "${name}.zip"
