name: Release

# 推送版本号 tag 时触发（带不带 v 都可：0.2.0 或 v0.2.0）：跑测试，把整个仓库
# 打成源码包（tar.gz + zip），然后在 Releases 创建一个以该 tag 命名的「草稿」
# release，自动生成 release notes，并把源码包作为附件上传。
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"    # 0.2.0
      - "v[0-9]+.[0-9]+.[0-9]+"   # v0.2.0（兼容旧格式）

# 允许内置的 GITHUB_TOKEN 创建 release。
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 拉取完整历史与全部 tag，用于从提交日志生成 release notes

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --extra dev pytest

      - name: Package repository archives
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="image-studio-${version}"
          # 从当前检出的 tag 提交树打包，自动排除 .git 与未跟踪文件（.venv/data 等）。
          git archive --format=tar.gz --prefix="${name}/" -o "${name}.tar.gz" HEAD
          git archive --format=zip    --prefix="${name}/" -o "${name}.zip"    HEAD
          ls -lh "${name}".tar.gz "${name}".zip

      - name: Build release notes from commit log
        run: |
          # 上个版本 tag（当前 tag 父提交可达的最近 tag）；首个版本则取全部历史。
          prev="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$prev" ]; then
            range="${prev}..${GITHUB_REF_NAME}"
          else
            range="$GITHUB_REF_NAME"
          fi

          {
            echo "## What's Changed"
            echo
            git log --no-merges --pretty='- %s (%h)' "$range" || true
            echo
            if [ -n "$prev" ]; then
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${prev}...${GITHUB_REF_NAME}"
            fi
          } > RELEASE_NOTES.md

          echo "----- generated notes -----"
          cat RELEASE_NOTES.md

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="image-studio-${version}"
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            "${name}.tar.gz" "${name}.zip"
